<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tools Nepal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-surface) 100%);
            position: relative;
            overflow: hidden;
        }

        body.light-mode .login-section {
            background: linear-gradient(135deg, var(--light-bg) 0%, var(--light-surface) 100%);
        }

        .login-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .login-card {
            background-color: var(--dark-surface);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        body.light-mode .login-card {
            background-color: var(--light-bg);
            border: 1px solid var(--light-border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .login-logo-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 8px;
        }

        .login-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .login-form {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        body.light-mode .form-group input {
            background-color: var(--light-surface);
            border: 1px solid var(--light-border-color);
            color: var(--light-text-primary);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--primary-color);
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--secondary-color);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--border-color);
        }

        .divider span {
            background-color: var(--dark-surface);
            color: var(--text-secondary);
            padding: 0 1rem;
            position: relative;
        }

        body.light-mode .divider span {
            background-color: var(--light-bg);
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        body.light-mode .social-btn {
            background-color: var(--light-surface);
            border: 1px solid var(--light-border-color);
            color: var(--light-text-primary);
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .social-btn.google:hover {
            background-color: #ea4335;
            color: white;
            border-color: #ea4335;
        }

        .social-btn.facebook:hover {
            background-color: #1877f2;
            color: white;
            border-color: #1877f2;
        }

        .signup-link {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 1.5rem;
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: var(--secondary-color);
        }

        .back-to-home {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background-color: var(--dark-surface);
            transition: all 0.3s ease;
            z-index: 10;
        }

        body.light-mode .back-to-home {
            background-color: var(--light-bg);
            border: 1px solid var(--light-border-color);
            color: var(--light-text-primary);
        }

        .back-to-home:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .form-group.error input {
            border-color: var(--error-color);
        }

        .form-group.error .error-message {
            display: block;
        }

        .success-notification {
            position: fixed;
            top: 100px;
            right: 20px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
            z-index: 10000;
            font-weight: 600;
            animation: slideIn 0.3s ease-out;
            max-width: 300px;
            display: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 0 15px;
            }

            .login-card {
                padding: 2rem;
            }

            .back-to-home {
                top: 20px;
                left: 20px;
                padding: 8px 16px;
            }

            .login-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <section class="login-section">
        <a href="index.html" class="back-to-home">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <img src="images/logo.webp" alt="Tools Nepal Logo" class="login-logo-img">
                        <span>Tools Nepal</span>
                    </div>
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">Sign in to your account</p>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <span class="error-message">Please enter a valid email address</span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                        <span class="error-message">Please enter your password</span>
                    </div>

                    <div class="remember-forgot">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>
                </form>

                <div class="divider">
                    <span>Or continue with</span>
                </div>

                <div class="social-login">
                    <a href="#" class="social-btn google" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                        Continue with Google
                    </a>
                    <a href="#" class="social-btn facebook" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i>
                        Continue with Facebook
                    </a>
                </div>

                <div class="signup-link">
                    Don't have an account? <a href="#">Sign up</a>
                </div>
            </div>
        </div>

        <div class="success-notification" id="successNotification">
            Login successful! Redirecting...
        </div>
    </section>

    <script>
        // Login Page JavaScript
        class LoginPage {
            constructor() {
                this.loginForm = document.getElementById('loginForm');
                this.successNotification = document.getElementById('successNotification');
                this.init();
            }

            init() {
                this.setupFormValidation();
                this.setupThemeToggle();
            }

            setupFormValidation() {
                this.loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                const inputs = this.loginForm.querySelectorAll('input');
                inputs.forEach(input => {
                    input.addEventListener('blur', () => this.validateField(input));
                    input.addEventListener('input', () => {
                        if (input.parentElement.classList.contains('error')) {
                            this.validateField(input);
                        }
                    });
                });
            }

            validateField(field) {
                const formGroup = field.closest('.form-group');
                const value = field.value.trim();

                formGroup.classList.remove('error');

                if (!value) {
                    formGroup.classList.add('error');
                    return false;
                }

                if (field.type === 'email') {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(value)) {
                        formGroup.classList.add('error');
                        return false;
                    }
                }

                return true;
            }

            validateForm() {
                const inputs = this.loginForm.querySelectorAll('input[required]');
                let isValid = true;

                inputs.forEach(input => {
                    if (!this.validateField(input)) {
                        isValid = false;
                    }
                });

                return isValid;
            }

            handleLogin() {
                if (!this.validateForm()) {
                    this.showError('Please fill in all fields correctly');
                    return;
                }

                const formData = {
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value.trim(),
                    remember: document.querySelector('input[name="remember"]').checked
                };

                // Simulate login process
                this.simulateLogin(formData);
            }

            simulateLogin(formData) {
                // Show success notification
                this.showSuccessNotification();

                // Store login session (demo)
                if (formData.remember) {
                    localStorage.setItem('rememberedUser', formData.email);
                }

                // Redirect to home after delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }

            showSuccessNotification() {
                this.successNotification.style.display = 'block';
                
                setTimeout(() => {
                    this.successNotification.style.animation = 'slideOut 0.3s ease-out';
                    setTimeout(() => {
                        this.successNotification.style.display = 'none';
                        this.successNotification.style.animation = 'slideIn 0.3s ease-out';
                    }, 300);
                }, 1800);
            }

            showError(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                
                notification.style.cssText = `
                    position: fixed;
                    top: 100px;
                    right: 20px;
                    background: linear-gradient(135deg, #ef4444, #dc2626);
                    color: white;
                    padding: 15px 25px;
                    border-radius: 10px;
                    box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
                    z-index: 10000;
                    font-weight: 600;
                    animation: slideIn 0.3s ease-out;
                    max-width: 300px;
                `;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease-out';
                    setTimeout(() => {
                        notification.remove();
                    }, 300);
                }, 3000);
            }

            setupThemeToggle() {
                // Check for existing theme toggle in nav (if present)
                const existingToggle = document.getElementById('themeToggle');
                if (existingToggle) return;

                // Create theme toggle for login page
                const themeToggle = document.createElement('button');
                themeToggle.className = 'theme-toggle';
                themeToggle.innerHTML = '<i class="fas fa-moon" id="themeIcon"></i>';
                themeToggle.style.cssText = `
                    position: fixed;
                    top: 30px;
                    right: 30px;
                    background: none;
                    border: 1px solid var(--border-color);
                    color: var(--text-primary);
                    font-size: 1.2rem;
                    cursor: pointer;
                    padding: 10px;
                    border-radius: 50%;
                    transition: all 0.3s ease;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 10;
                `;

                document.body.appendChild(themeToggle);

                const themeIcon = document.getElementById('themeIcon');
                const body = document.body;

                // Load saved theme
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'light') {
                    body.classList.add('light-mode');
                    themeIcon.className = 'fas fa-sun';
                }

                themeToggle.addEventListener('click', () => {
                    const isLightMode = body.classList.toggle('light-mode');
                    
                    if (isLightMode) {
                        themeIcon.className = 'fas fa-sun';
                        localStorage.setItem('theme', 'light');
                    } else {
                        themeIcon.className = 'fas fa-moon';
                        localStorage.setItem('theme', 'dark');
                    }
                });

                themeToggle.addEventListener('mouseenter', () => {
                    themeToggle.style.backgroundColor = 'rgba(139, 92, 246, 0.1)';
                    themeToggle.style.color = 'var(--primary-color)';
                });

                themeToggle.addEventListener('mouseleave', () => {
                    themeToggle.style.backgroundColor = 'transparent';
                    themeToggle.style.color = 'var(--text-primary)';
                });
            }
        }

        // Social login functions
        function socialLogin(provider) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = `${provider.charAt(0).toUpperCase() + provider.slice(1)} login is a demo feature`;
            
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: linear-gradient(135deg, #f59e0b, #d97706);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
                z-index: 10000;
                font-weight: 600;
                animation: slideIn 0.3s ease-out;
                max-width: 300px;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }

        // Initialize login page
        const loginPage = new LoginPage();

        // Check for remembered user
        const rememberedUser = localStorage.getItem('rememberedUser');
        if (rememberedUser) {
            document.getElementById('email').value = rememberedUser;
            document.querySelector('input[name="remember"]').checked = true;
        }

        // Forgot password handler
        document.querySelector('.forgot-password').addEventListener('click', (e) => {
            e.preventDefault();
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = 'Password reset is a demo feature';
            
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: linear-gradient(135deg, #3b82f6, #2563eb);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
                z-index: 10000;
                font-weight: 600;
                animation: slideIn 0.3s ease-out;
                max-width: 300px;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        });

        // Signup link handler
        document.querySelector('.signup-link a').addEventListener('click', (e) => {
            e.preventDefault();
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = 'Signup is a demo feature';
            
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: linear-gradient(135deg, #10b981, #059669);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
                z-index: 10000;
                font-weight: 600;
                animation: slideIn 0.3s ease-out;
                max-width: 300px;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        });
    </script>
</body>
</html>
